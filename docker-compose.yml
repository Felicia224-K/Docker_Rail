services:

 
  api:
    build: .                    
    container_name: cir-api         
    restart: unless-stopped        
    ports:
      - "3000:3000"        
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_USER: user
      DB_PASSWORD: Fel1_224K_6erbl4n
      DB_NAME: cir_iot
      DB_PORT: 5432
      DATABASE_URL: postgres://user:Fel1_224K_6erbl4n@postgres:5432/cir_iot
      REDIS_PORT: 6379
 
      REDIS_HOST: redis             
      JWT_SECRET: ${JWT_SECRET}     
    depends_on:
      postgres:
        condition: service_healthy  
      redis:
        condition: service_started  
    networks:
      - cir-network

  
  postgres:
    image: postgres:16-alpine       
    container_name: cir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cir_iot     
      POSTGRES_USER: user
      POSTGRES_PASSWORD: Fel1_224K_6erbl4n
    volumes:
      - postgres_data:/var/lib/postgresql/data  
    healthcheck:                    
      test: ['CMD-SHELL', 'pg_isready -U user -d cir_iot']
      interval: 10s                 
      timeout: 5s                   
      retries: 5                    
    networks:
      - cir-network


  redis:
    image: redis:7-alpine
    container_name: cir-redis
    restart: unless-stopped
    command: redis-server --appendonly yes  
    volumes:
     - redis_data:/data            
    networks:
      - cir-network

  nginx:
    image: nginx:alpine
    container_name: cir-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - cir-network


  prometheus:
    image: prom/prometheus:latest
    container_name: cir-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - cir-network


  grafana:
    image: grafana/grafana:latest
    container_name: cir-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - cir-network


volumes:
  postgres_data:
  redis_data:


networks:
  cir-network:
    driver: bridge