name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests automatises
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cir_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm test
      
  env:
    DATABASE_URL: postgres://testuser:testpass@localhost:5432/cir_test
    DB_HOST: localhost
    DB_USER: testuser
    DB_PASSWORD: testpass
    DB_NAME: cir_test
    DB_PORT: 5432
    JWT_SECRET: test_secret_for_ci
    REDIS_HOST: localhost
    REDIS_PORT: 6379
    NODE_ENV: test

  deploy:
    name: Deploiement production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Deploy sur Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: api-iot

          